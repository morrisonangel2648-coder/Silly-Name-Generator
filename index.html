<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silly Name Generator | AI Project</title>
    <style>
        /* All-in-one CSS: No external files needed */
        body {
            background-color: #fce4ec;
            background-image: radial-gradient(#d1108a 0.5px, transparent 0.5px);
            background-size: 30px 30px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; justify-content: center; padding: 40px 10px; margin: 0;
        }
        .card {
            background: white; padding: 30px; border-radius: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1); width: 100%; max-width: 400px;
            text-align: center; border: 4px solid #f8bbd0; position: relative;
        }
        h1 { font-family: "Comic Sans MS", cursive; color: #d1108a; margin: 0 0 20px 0; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { font-weight: bold; color: #9933ff; display: block; margin-bottom: 5px; font-size: 0.85rem; }
        input[type="text"] { width: 100%; padding: 12px; border: 2px solid #fce4ec; border-radius: 10px; box-sizing: border-box; }
       
        .radio-group {
            display: flex; justify-content: space-around; background: #fdf5ff;
            padding: 12px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #fce4ec;
        }
       
        button { border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: transform 0.1s; }
        button:active { transform: scale(0.95); }

        .btn-gen {
            background: linear-gradient(to right, #d1108a, #9933ff);
            color: white; width: 100%; padding: 15px; font-size: 1.1rem; margin-bottom: 10px;
        }
        .btn-small { background: #e1bee7; color: #6a0dad; width: 100%; padding: 10px; font-size: 0.9rem; margin-bottom: 5px; }
       
        #result-area {
            margin-top: 20px; padding: 15px; border: 3px dashed #ff99cc;
            background: #fff0f7; border-radius: 15px; display: none;
        }
        .silly-display { font-size: 1.5rem; color: #d1108a; font-weight: 900; display: block; margin-bottom: 10px; }
       
        .history { margin-top: 25px; text-align: left; border-top: 2px solid #eee; padding-top: 15px; }
        .history-list { list-style: none; padding: 0; max-height: 120px; overflow-y: auto; font-size: 0.85rem; }
        .history-list li {
            padding: 8px; background: #fdf5ff; margin-bottom: 5px;
            border-radius: 8px; border-left: 5px solid #d1108a;
        }
       
        /* High-compatibility confetti dots */
        .confetti { position: fixed; width: 10px; height: 10px; z-index: 9999; border-radius: 50%; pointer-events: none; }
    </style>
</head>
<body>

<div class="card">
    <div style="font-size: 50px;">🏰</div>
    <h1>Silly Name Generator</h1>
   
    <div class="input-group">
        <label>👑 Royal Title:</label>
        <div class="radio-group">
            <label><input type="radio" name="title" value="King" checked> King</label>
            <label><input type="radio" name="title" value="Queen"> Queen</label>
        </div>
    </div>

    <div class="input-group"><label>🏰 Kingdom Noun:</label><input type="text" id="noun" placeholder="e.g. Pancake"></div>
    <div class="input-group"><label>🎨 Royal Color:</label><input type="text" id="color" placeholder="e.g. Sparkly"></div>
    <div class="input-group"><label>🏃 Action Word:</label><input type="text" id="action" placeholder="e.g. Boop"></div>
    <div class="input-group"><label>🧸 Random Object:</label><input type="text" id="object" placeholder="e.g. Spoon"></div>

    <button class="btn-gen" onclick="generate()">✨ GENERATE ROYALTY ✨</button>
    <button class="btn-small" onclick="randomize()">🎲 Randomize</button>

    <div id="result-area">
        <span class="silly-display" id="outName"></span>
        <button onclick="copyName()" style="background:#6a0dad; color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer; width:100%;">📋 Copy to Clipboard</button>
    </div>

    <div class="history">
        <strong>📜 Royal Archives:</strong>
        <ul id="archiveList" class="history-list"></ul>
    </div>
</div>

<script>
    // Feature: Core Logic & Confetti
    function generate() {
        var t = document.querySelector('input[name="title"]:checked').value;
        var n = document.getElementById('noun').value.trim();
        var c = document.getElementById('color').value.trim();
        var a = document.getElementById('action').value.trim();
        var o = document.getElementById('object').value.trim();

        if(!n || !c || !a || !o) { alert("Please fill all boxes, your Majesty!"); return; }

        var actionY = a.endsWith('e') ? a.slice(0, -1) + 'y' : a + 'y';
        var final = t + " " + c + " " + actionY + " " + o + " of " + n + "landia";

        // Show result
        document.getElementById('outName').innerText = final;
        document.getElementById('result-area').style.display = 'block';

        // Update Archive (History)
        var list = document.getElementById('archiveList');
        var li = document.createElement('li');
        li.innerText = "👑 " + final;
        list.insertBefore(li, list.firstChild);

        // Confetti Burst Effect
        var colors = ['#ff00bf', '#9933ff', '#ffd700', '#00d4ff'];
        for (var i = 0; i < 40; i++) {
            var dot = document.createElement('div');
            dot.className = 'confetti';
            dot.style.backgroundColor = colors[Math.floor(Math.random() * 4)];
            dot.style.left = '50%'; dot.style.top = '50%';
            document.body.appendChild(dot);
            dot.animate([
                { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
                { transform: 'translate(' + (Math.random()-0.5)*600 + 'px, ' + (Math.random()-0.5)*600 + 'px) scale(0)', opacity: 0 }
            ], { duration: 1000 + Math.random() * 500 }).onfinish = function() { this.target.remove(); };
        }
    }

    // Feature: Randomizer
    function randomize() {
        var nouns = ["Pickle", "Taco", "Unicorn", "Noodle", "Marshmallow"];
        var colors = ["Neon", "Shiny", "Golden", "Polka-dot", "Invisible"];
        var actions = ["Wiggle", "Bounce", "Snore", "Boop", "Spin"];
        var objects = ["Spoon", "Sock", "Muffin", "Toaster", "Hat"];

        document.getElementById('noun').value = nouns[Math.floor(Math.random()*5)];
        document.getElementById('color').value = colors[Math.floor(Math.random()*5)];
        document.getElementById('action').value = actions[Math.floor(Math.random()*5)];
        document.getElementById('object').value = objects[Math.floor(Math.random()*5)];
    }

    // Feature: Clipboard
    function copyName() {
        var text = document.getElementById('outName').innerText;
        navigator.clipboard.writeText(text);
        alert("Copied to clipboard!");
    }
</script>
</body>
</html>
